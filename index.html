<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Chapada Escapade</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.js"></script>
    <style>
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: #0a0a0a;
            overflow: hidden;
            font-family: monospace;
            touch-action: none;
            /* Safe-area pra notch (iPhone) */
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            box-sizing: border-box;
        }
        #wrap {
            width: 100%; height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #game-host {
            width: 75vw; height: 75vh;
            border: none;
            border-radius: 14px;
            overflow: hidden;
            touch-action: none;
        }
        canvas { display: block; touch-action: none; border-radius: 14px; }
        /* Mobile (touch screens / portrait / pequenos) — fullscreen sem border-radius */
        @media (max-width: 900px), (pointer: coarse) {
            #game-host {
                width: 100%; height: 100%;
                border-radius: 0;
            }
            canvas { border-radius: 0; }
        }
        /* Pre-Phaser loading screen */
        #pre-loader {
            position: fixed; inset: 0;
            background: #050a04;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 10000;
            transition: opacity 0.4s ease;
            font-family: 'Courier New', monospace;
            color: #00ff55;
        }
        #pre-loader.fade { opacity: 0; pointer-events: none; }
        #pre-loader-title {
            font-size: 22px; font-weight: bold;
            letter-spacing: 4px; margin-bottom: 26px;
            text-shadow: 0 0 12px rgba(0,255,85,0.4);
        }
        #pre-loader-bar-bg {
            width: 320px; height: 18px;
            background: rgba(0,32,16,0.7);
            border: 1.5px solid #00aa44;
            border-radius: 3px;
            overflow: hidden;
            box-shadow: 0 0 18px rgba(0,255,85,0.18);
        }
        #pre-loader-bar {
            width: 0%; height: 100%;
            background: linear-gradient(90deg, #00cc44, #66ff99);
            transition: width 0.18s ease-out;
        }
        #pre-loader-pct {
            font-size: 12px; opacity: 0.7;
            margin-top: 12px;
        }
    </style>
</head>
<body>
<div id="pre-loader">
    <div id="pre-loader-title">CHAPADA ESCAPADE</div>
    <div id="pre-loader-bar-bg"><div id="pre-loader-bar"></div></div>
    <div id="pre-loader-pct">0%</div>
</div>
<div id="wrap"><div id="game-host"></div></div>
