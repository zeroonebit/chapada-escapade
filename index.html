        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: #0a0a0a;
            overflow: hidden;
            font-family: monospace;
            touch-action: none;
        }
        #wrap {
            width: 100vw; height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #game-host {
            width: 75vw; height: 75vh;
            box-shadow: 0 0 30px rgba(0, 200, 80, 0.15);
            border: 2px solid #1a3322;
            touch-action: none;
        }
        canvas { display: block; touch-action: none; }
    </style>
</head>

<div id="wrap"><div id="game-host"></div></div>
