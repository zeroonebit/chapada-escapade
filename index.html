<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Chapada Escapade</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.js"></script>
    <style>
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: #0a0a0a;
            overflow: hidden;
            font-family: monospace;
            touch-action: none;
            /* Safe-area pra notch (iPhone) */
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            box-sizing: border-box;
        }
        #wrap {
            width: 100%; height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #game-host {
            width: 75vw; height: 75vh;
            border: none;
            border-radius: 14px;
            overflow: hidden;
            touch-action: none;
        }
        canvas { display: block; touch-action: none; border-radius: 14px; }
        /* Mobile (touch screens / portrait / pequenos) — fullscreen sem border-radius */
        @media (max-width: 900px), (pointer: coarse) {
            #game-host {
                width: 100%; height: 100%;
                border-radius: 0;
            }
            canvas { border-radius: 0; }
        }
        /* Pre-Phaser loading screen */
        #pre-loader {
            position: fixed; inset: 0;
            background: #050a04;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 10000;
            transition: opacity 0.4s ease;
            font-family: 'Courier New', monospace;
            color: #00ff55;
        }
        #pre-loader.fade { opacity: 0; pointer-events: none; }
        #pre-loader-title {
            font-size: 22px; font-weight: bold;
            letter-spacing: 4px; margin-bottom: 26px;
            text-shadow: 0 0 12px rgba(0,255,85,0.4);
        }
        #pre-loader-bar-bg {
            width: 320px; height: 18px;
            background: rgba(0,32,16,0.7);
            border: 1.5px solid #00aa44;
            border-radius: 3px;
            overflow: hidden;
            box-shadow: 0 0 18px rgba(0,255,85,0.18);
        }
        #pre-loader-bar {
            width: 0%; height: 100%;
            background: linear-gradient(90deg, #00cc44, #66ff99);
            transition: width 0.18s ease-out;
        }
        #pre-loader-pct {
            font-size: 12px; opacity: 0.7;
            margin-top: 12px;
        }
    </style>
</head>
<body>
<div id="pre-loader">
    <div id="pre-loader-title">CHAPADA ESCAPADE</div>
    <div id="pre-loader-bar-bg"><div id="pre-loader-bar"></div></div>
    <div id="pre-loader-pct">0%</div>
</div>
<div id="wrap"><div id="game-host"></div></div>

<!-- ── FAILSAFE MOBILE ─────────────────────────────────────────────── -->
<!-- Tela pequena/touch: bloqueia load dos modulos do jogo, pinta preloader
     vermelho com icones (proibido celular / permitido PC). Desktop: load
     dinamico dos modulos na ordem correta. -->
<script>
(function() {
    const V = '20260429s';
    // Detecta mobile/touch pequeno: igual @media query do CSS (max-width:900px)
    // OU pointer:coarse (touch screens) com viewport menor que 1024
    const smallScreen = window.matchMedia('(max-width: 900px)').matches;
    const touchSmall  = window.matchMedia('(pointer: coarse)').matches && window.innerWidth < 1024;
    const blockMobile = smallScreen || touchSmall;

    if (blockMobile) {
        // ── MOBILE: titulo CHAPADA ESCAPADE persistente sobre o jogo ──
        // O preloader vira overlay permanente apos carga (pointer-events none
        // pra UFO passar por baixo). Ver 02_preload.js complete callback.
        const t = document.getElementById('pre-loader-title');
        t.innerHTML = 'CHAPADA<br/>ESCAPADE';
        t.style.fontSize = '36px';
        t.style.letterSpacing = '6px';
        t.style.lineHeight = '1.2';
        t.style.color = '#ff5566';
        t.style.textShadow = '0 0 16px rgba(255,80,80,0.7)';
        t.style.marginBottom = '20px';

        const preLoader = document.getElementById('pre-loader');
        preLoader.style.color = '#ff5566';
        preLoader.style.background = '#0a0404';

        const bg = document.getElementById('pre-loader-bar-bg');
        bg.style.borderColor = '#cc2222';
        bg.style.background = 'rgba(40,8,8,0.7)';
        bg.style.boxShadow = '0 0 18px rgba(255,80,80,0.3)';

        const bar = document.getElementById('pre-loader-bar');
        bar.style.background = 'linear-gradient(90deg, #cc1122, #ff5566)';

        // Flag pro game aplicar teaser mode (terreno + storm + vignette)
        window.__MOBILE_MODE = true;
        // Continua execucao normal -> loader desktop carrega os modulos abaixo
    }

    // Desktop: load dinamico dos modulos na ordem correta
    // 00_constants antes de tudo; 01_scene define classe; demais estendem prototype; 99_main instancia
    const modules = [
        '00_constants', '01_scene', '02_preload', '03_textures', '04_cenario',
        '05_hud', '06_nave', '07_vacas', '08_curral', '09_inimigos', '10_colisao',
        '11_gameflow', '12_mobile', '13_terrain_shader', '14_grass_patch',
        '15_debug_menu', '16_fx', '17_tutorial', '18_atmosphere', '19_debug_overlay',
        '20_quips', '99_main'
    ];
    let i = 0;
    function loadNext() {
        if (i >= modules.length) return;
        const s = document.createElement('script');
        s.src = `js/${modules[i]}.js?v=${V}`;
        s.onload = () => { i++; loadNext(); };
        s.onerror = () => console.error('Falhou:', s.src);
        document.body.appendChild(s);
    }
    loadNext();
})();
</script>
</body>
</html>
