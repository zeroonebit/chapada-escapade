<!DOCTYPE html>

<title>Chapada Escapade — Asset Gallery</title>
<style>
  body{margin:0;background:#1a1410;color:#e8d9b8;font-family:monospace;display:flex;flex-direction:column;align-items:center;min-height:100vh;}
  h1{margin:18px 0 6px;font-size:18px;color:#f4c95d;}
  .meta{font-size:12px;opacity:.7;margin-bottom:14px;}
  .stage{position:relative;width:520px;height:520px;background:repeating-conic-gradient(#2a2218 0% 25%,#332a1f 0% 50%) 50%/40px 40px;border:2px solid #4a3826;display:flex;align-items:center;justify-content:center;image-rendering:pixelated;}
  .stage img{max-width:90%;max-height:90%;image-rendering:pixelated;}
  .pending{color:#f4c95d;font-size:14px;text-align:center;padding:20px;}
  .nav{display:flex;gap:18px;margin:18px 0 8px;align-items:center;}
  button{background:#3a2d1e;color:#f4c95d;border:2px solid #6b5234;padding:10px 18px;font-family:monospace;font-size:18px;cursor:pointer;border-radius:4px;}
  button:hover{background:#4a3826;}
  button:disabled{opacity:.3;cursor:not-allowed;}
  .info{font-size:14px;text-align:center;line-height:1.6;margin-bottom:8px;}
  .name{color:#f4c95d;font-size:16px;font-weight:bold;}
  .id{font-size:10px;opacity:.5;}
  .status{font-size:12px;padding:3px 8px;border-radius:3px;display:inline-block;margin-top:4px;}
  .status.ready{background:#2d5a2d;color:#9fe89f;}
  .status.pending{background:#5a4a2d;color:#f4c95d;}
  .counter{font-size:14px;color:#a89368;}
  .grid{display:grid;grid-template-columns:repeat(8,48px);gap:4px;margin:18px 0;}
  .thumb{width:48px;height:48px;background:#2a2218;border:2px solid #4a3826;cursor:pointer;display:flex;align-items:center;justify-content:center;image-rendering:pixelated;}
  .thumb img{max-width:100%;max-height:100%;image-rendering:pixelated;}
  .thumb.active{border-color:#f4c95d;}
  .thumb.pending{opacity:.4;}
  .refresh{font-size:11px;opacity:.6;margin-top:4px;}
</style>
</head>

const API_URL = id => `https://api.pixellab.ai/mcp/map-objects/${id}/download`;
let idx = 0;
let refreshTimer = 8;

const $ = id => document.getElementById(id);

function render(){
  const a = MANIFEST[idx];
  if(!a){return;}
  $("name").textContent = a.name;
  $("id").textContent = a.id;
  $("status").textContent = a.status;
  $("status").className = "status " + a.status;
  $("counter").textContent = (idx+1) + " / " + MANIFEST.length;

  if(a.status === "ready"){
    $("img").src = a.path || API_URL(a.id);
    $("img").style.display = "block";
    $("pending").style.display = "none";
  }else{
    // tenta carregar direto da API mesmo assim — se já saiu, aparece
    $("img").src = API_URL(a.id) + "?t=" + Date.now();
    $("img").style.display = "block";
    $("pending").style.display = "block";
    $("img").onerror = ()=>{ $("img").style.display = "none"; };
    $("img").onload = ()=>{ $("pending").style.display = "none"; };
  }

  // grid
  $("grid").innerHTML = "";
  MANIFEST.forEach((m,i)=>{
    const t = document.createElement("div");
    t.className = "thumb" + (i===idx?" active":"") + (m.status==="pending"?" pending":"");
    if(m.status === "ready"){
      const img = document.createElement("img");
      img.src = m.path || API_URL(m.id);
      t.appendChild(img);
    }else{
      t.textContent = "…";
    }
    t.onclick = ()=>{ idx = i; render(); };
    $("grid").appendChild(t);
  });
}

$("prev").onclick = ()=>{ idx = (idx - 1 + MANIFEST.length) % MANIFEST.length; render(); };
$("next").onclick = ()=>{ idx = (idx + 1) % MANIFEST.length; render(); };

document.addEventListener("keydown", e => {
  if(e.key === "ArrowLeft") $("prev").click();
  if(e.key === "ArrowRight") $("next").click();
});

setInterval(()=>{
  refreshTimer--;
  if(refreshTimer <= 0){
    refreshTimer = 8;
    render(); // re-tenta carregar pendentes
  }
  $("refreshInfo").textContent = "próximo refresh em " + refreshTimer + "s";
}, 1000);

render();
